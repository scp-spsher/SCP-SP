<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>SCP-SP Redirect</title>
    <script>
      // Redirect unknown GitHub Pages routes back to SPA entry.
      // pathSegmentsToKeep=1 for project site: /SCP-SP
      var pathSegmentsToKeep = 1;
      var l = window.location;
      var repoBase = l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/');
      var route = l.pathname.slice(repoBase.length).replace(/\/+/g, '/');
      var target =
        repoBase +
        '/?/' +
        route.replace(/^\/+/, '').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash;
      l.replace(target);
    </script>
  </head>
  <body></body>
</html>
